{{define "app-styles"}}
<meta name="csrf-token" content="{{.CSRFToken}}" />
<link href="/assets/css/dist/tasks.min.css" rel="stylesheet" />
<script type="module" src="/assets/js/dist/tasks.min.js"></script>
{{end}} {{define "tasks-page"}}
<!doctype html>
<html lang="en">
    <head>
        {{template "meta"}} {{template "app-styles" .}}
    </head>
    <body>
        {{template "header"}}
        <rm-tasks-app>
            <!-- left column -->
            {{template "sidebar" .}}
            <!-- center column -->
            <div class="main" role="main">
                {{if eq .Persistence.ListId 0}} {{template "landing-screen"}} {{else}} {{template
                "persisted-list-content" .}} {{end}}
            </div>
            <!-- right column -->
            <aside class="details"></aside>
        </rm-tasks-app>
        <script src="/assets/js/apps/tasks/main.js" defer></script>
    </body>
</html>
{{end}}
